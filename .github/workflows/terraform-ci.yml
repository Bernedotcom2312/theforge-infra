name: Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-ci:
    name: Validate & Plan
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2.1.10
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: "1.15.0"
          terraform_wrapper: true

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4.1.0
        with:
          tflint_version: v0.55.0

      - name: TFLint init
        run: tflint --init

      - name: TFLint run
        id: tflint
        run: tflint --format=compact --no-color
        continue-on-error: true

      - name: Checkov scan
        id: checkov
        uses: bridgecrewio/checkov-action@v12.2874.0
        with:
          directory: .
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Terraform plan
        id: plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}" \
            -out=plan.tfplan \
            -no-color \
            -input=false 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7.0.1
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planText = fs.existsSync('plan-output.txt')
              ? fs.readFileSync('plan-output.txt', 'utf8')
              : 'Plan output not available.';

            const statusIcon = (s) => s === 'success' ? '✅' : '❌';

            const body = [
              '## Terraform Plan',
              '',
              '| Step | Status |',
              '|---|---|',
              `| Format (\`terraform fmt\`) | ${statusIcon('${{ steps.fmt.outcome }}')} ${{ steps.fmt.outcome }} |`,
              `| Init | ${statusIcon('${{ steps.init.outcome }}')} ${{ steps.init.outcome }} |`,
              `| Validate | ${statusIcon('${{ steps.validate.outcome }}')} ${{ steps.validate.outcome }} |`,
              `| Plan | ${statusIcon('${{ steps.plan.outcome }}')} ${{ steps.plan.outcome }} |`,
              '',
              '<details><summary>Show plan output</summary>',
              '',
              '```',
              planText.substring(0, 60000),
              '```',
              '',
              '</details>',
              '',
              `*Triggered by @${{ github.actor }} — commit \`${{ github.sha }}\`*`,
            ].join('\n');

            const marker = '<!-- terraform-plan-comment -->';
            const fullBody = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Check plan exit code
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "Terraform plan failed. See comment on PR for details."
          exit 1
