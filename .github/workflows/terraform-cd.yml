name: Terraform CD

on:
  push:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-cd.yml"

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  terraform-apply:
    name: Apply to production
    runs-on: ubuntu-26.04
    environment: production
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup
        uses: ./.github/actions/terraform-setup
        with:
          gcp_wif_provider: ${{ vars.GCP_WIF_PROVIDER }}
          gcp_sa_email: ${{ vars.GCP_SA_EMAIL }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -input=false

      - name: Find CI run for this commit
        id: find-ci-run
        uses: actions/github-script@v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'terraform-ci.yml',
              head_sha: context.sha,
              status: 'success',
              per_page: 1,
            });
            const run = data.workflow_runs[0];
            if (!run) core.setFailed(`No successful CI run found for ${context.sha}`);
            core.setOutput('run-id', String(run.id));

      - name: Download plan artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: plan-${{ github.sha }}
          run-id: ${{ steps.find-ci-run.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Terraform apply
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            plan.tfplan
